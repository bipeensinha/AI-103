<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>FunGPT Premium</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #2b2d42, #1a1c2c);
    color: white;
}

/* Header */
.header {
    text-align: center;
    padding: 18px;
    font-size: 22px;
    font-weight: bold;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
}

/* Chat container */
#chat {
    max-width: 850px;
    margin: 20px auto;
    height: 420px;
    overflow-y: auto;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
}

/* Messages */
.message {
    display: flex;
    align-items: flex-end;
    margin: 12px 0;
}

.message.user {
    justify-content: flex-end;
}

.bubble {
    padding: 12px 16px;
    border-radius: 15px;
    max-width: 70%;
    line-height: 1.4;
}

.user .bubble {
    background: #10a37f;
}

.ai .bubble {
    background: #2d2f3a;
}

/* Avatar */
.avatar {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    margin: 0 8px;
}

/* Input */
.input-area {
    max-width: 850px;
    margin: auto;
    display: flex;
    gap: 10px;
    padding: 10px;
}

textarea {
    flex: 1;
    height: 70px;
    border-radius: 10px;
    border: none;
    padding: 12px;
    font-size: 14px;
    resize: none;
}

/* Buttons */
button {
    background: linear-gradient(135deg, #10a37f, #0d8f6a);
    border: none;
    color: white;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

/* Reset */
.controls {
    max-width: 850px;
    margin: auto;
    text-align: right;
    padding: 10px;
}

/* Welcome */
.welcome {
    text-align: center;
    margin-top: 40px;
    opacity: 0.85;
}

.suggestions {
    margin-top: 15px;
}

.suggestions div {
    background: rgba(255,255,255,0.1);
    margin: 6px;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    display: inline-block;
}

.suggestions div:hover {
    background: rgba(255,255,255,0.2);
}

/* Typing */
.typing {
    font-style: italic;
    opacity: 0.7;
}
</style>

</head>

<body>

<div class="header">
🤖 FunGPT Premium — Ask anything
</div>

<div id="chat">
    <div id="welcome" class="welcome">
        <h2>Welcome 👋</h2>
        <p>How can I help you today?</p>

```
    <div class="suggestions">
        <div onclick="quickAsk('Explain Azure AI')">Explain Azure AI</div>
        <div onclick="quickAsk('Plan a Europe trip')">Plan a trip</div>
        <div onclick="quickAsk('Write Python code')">Write code</div>
    </div>
</div>
```

</div>

<div class="controls">
    <button onclick="resetChat()">🔄 Reset</button>
</div>

<div class="input-area">
    <textarea id="msg" placeholder="Type your message..."></textarea>
    <button onclick="send()">Send</button>
</div>

<script>
async function send(customMsg=null) {
    let msgBox = document.getElementById("msg");
    let msg = customMsg || msgBox.value.trim();

    if (!msg) return;

    let chat = document.getElementById("chat");

    document.getElementById("welcome")?.remove();

    // User message
    chat.innerHTML += `
    <div class="message user">
        <div class="bubble">${msg}</div>
        <img class="avatar" src="https://i.pravatar.cc/40?img=3">
    </div>`;

    msgBox.value = "";
    chat.scrollTop = chat.scrollHeight;

    // Typing indicator
    chat.innerHTML += `<div id="typing" class="typing">FunGPT is typing...</div>`;

    let response = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    });

    let data = await response.json();

    document.getElementById("typing")?.remove();

    // AI response
    chat.innerHTML += `
    <div class="message ai">
        <img class="avatar" src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">
        <div class="bubble">${data.reply}</div>
    </div>`;

    chat.scrollTop = chat.scrollHeight;
}

// Enter send
document.getElementById("msg").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
    }
});

// Quick suggestions
function quickAsk(text) {
    send(text);
}

// Reset
async function resetChat() {
    document.getElementById("chat").innerHTML = `
    <div id="welcome" class="welcome">
        <h2>Welcome 👋</h2>
        <p>How can I help you today?</p>
    </div>`;
    await fetch("/reset", {method:"POST"});
}
</script>

</body>
</html>
